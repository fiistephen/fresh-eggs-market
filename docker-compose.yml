version: '3.8'

services:
  # ── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fresh_eggs
      POSTGRES_USER: ${DB_USER:-fresheggs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Only accessible from localhost
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fresheggs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Fastify API ────────────────────────────────────────────
  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-fresheggs}:${DB_PASSWORD}@db:5432/fresh_eggs?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      CORS_ORIGIN: https://fresheggsmarket.hiddekellabs.com
    ports:
      - "127.0.0.1:3001:3001" # Only accessible from localhost/nginx

  # ── React Frontend ─────────────────────────────────────────
  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
